version: "3.8"
services:
  node_api_similarauto:
    build:
      context: .
    container_name: node_api_similarauto
    ports:
      - "7575:7575"
    networks:
      - node_network
    environment:
      - ROXTER_CPUS=0
      - ROXTER_MODE=prod
      - ROXTER_PORT=7575
      - ROXTER_PATH_ROUTE=./src
      - BASEURL_GOOGLESHEETS=http://165.227.14.215:4109
      - BASEURL_NODEWORKS=http://165.227.14.215:4133
      - API_POLLINATIONS_AI=sk_px03FhEDkuCE0ZergNnsJFXnqMzq1gii
    healthcheck:
      test: ["CMD", "curl", "-f", "http://node_api_similarauto:7575/health"]
      interval: 12s
      timeout: 10s
      retries: 3
    restart: always

  caddy_similarauto:
    image: caddy:2
    container_name: caddy_similarauto
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_similarauto_data:/data
      - caddy_similarauto_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - node_network

networks:
  node_network:
    driver: bridge

volumes:
  caddy_similarauto_data:
  caddy_similarauto_config:
